<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) return;

  // validasi id
  if (!/^[a-zA-Z0-9]+$/.test(id)) {
    document.body.innerHTML =
      '<div class="error"><h2>Video tidak ditemukan</h2></div>';
    return;
  }

  const videoUrl = "https://cdn2.slicedrive.com/" + id + ".mp4";

  const source = document.getElementById("videoSource");
  source.src = videoUrl;

  const video = document.getElementById("player");

  video.onerror = function () {
    document.body.innerHTML =
      '<div class="error"><h2>Video gagal dimuat</h2><p>Cek ID atau server.</p></div>';
  };

  video.load();
  new Plyr(video);
})();
</script>
